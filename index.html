
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
.cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
.ct {
  padding: 6px 14px; border-radius: var(--border-radius-md);
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-secondary); cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all 0.12s;
}
.ct:hover { background: var(--color-background-secondary); }
.ct.on { border-width: 1.5px; color: var(--color-text-primary); border-color: var(--color-border-primary); background: var(--color-background-primary); }

.progress-bar { height: 4px; background: var(--color-background-secondary); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-fill { height: 4px; border-radius: 99px; background: #7F77DD; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; display: flex; justify-content: space-between; }

.section-block { margin-bottom: 1.5rem; }
.sec-header {
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 8px; border-bottom: 0.5px solid var(--color-border-tertiary);
  margin-bottom: 10px;
}
.sec-icon { font-size: 16px; color: var(--color-text-secondary); }
.sec-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.sec-count { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; }

.item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
  cursor: pointer; transition: background 0.1s;
}
.item:last-child { border-bottom: none; }
.item:hover { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding-left: 6px; }
.checkbox {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--color-border-secondary);
  flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.checkbox.checked { background: #7F77DD; border-color: #7F77DD; }
.check-mark { color: white; font-size: 10px; display: none; }
.checkbox.checked .check-mark { display: block; }
.item-text { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; flex: 1; }
.item-text.checked-text { color: var(--color-text-tertiary); text-decoration: line-through; }
.tag {
  font-size: 10px; font-weight: 500; padding: 2px 7px;
  border-radius: 99px; flex-shrink: 0; margin-top: 2px;
}
.tag-hot { background: #FAECE7; color: #993C1D; }
.tag-key { background: #EEEDFE; color: #3C3489; }
.tag-opt { background: #F1EFE8; color: #444441; }
.tag-lore { background: #E1F5EE; color: #0F6E56; }

.hidden { display: none; }
.all-done {
  text-align: center; padding: 2rem;
  color: var(--color-text-secondary); font-size: 14px;
}

.btn-reset {
  font-size: 12px; color: var(--color-text-secondary);
  background: none; border: 0.5px solid var(--color-border-tertiary);
  padding: 4px 12px; border-radius: var(--border-radius-md);
  cursor: pointer; margin-left: auto; display: block; margin-top: 1rem;
}
.btn-reset:hover { color: var(--color-text-primary); border-color: var(--color-border-secondary); }
</style>

<div class="wrap">

<div class="cat-tabs" id="cats"></div>

<div class="progress-label">
  <span id="prog-text">0 / 0 éléments complétés</span>
  <span id="prog-pct">0%</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

<div id="content"></div>
<button class="btn-reset" onclick="resetAll()">Tout réinitialiser</button>
</div>

<script>
const DATA = {
  "Monde & Setting": {
    icon: "ti-map-pin",
    items: [
      { t: "Choisir la ville précise (Columbus OH ou fictive inspirée)", tag: "key" },
      { t: "Délimiter les quartiers clés : là où le groupe vit, roule, traine", tag: "key" },
      { t: "Cartographier les spots bikelife (terrains vagues, parkings, tunnels)", tag: "lore" },
      { t: "Définir l'époque : contemporaine, passé proche, futur proche ?", tag: "key" },
      { t: "Niveau de présence policière / ambiance sociale du quartier", tag: "hot" },
      { t: "Existe-t-il d'autres crews bikelife dans la ville ? Rivaux, alliés ?", tag: "lore" },
      { t: "Quels lieux servent de QG informels (garage, appartement, squat)", tag: "lore" },
      { t: "La ville a-t-elle une scène graffiti active ? Hip-hop ?", tag: "opt" },
    ]
  },
  "Système de jeu": {
    icon: "ti-dice",
    items: [
      { t: "Quel système de jeu ? (GTA-like, PbtA, FitD, Savage Worlds, homebrew...)", tag: "key" },
      { t: "Définir les stats/attributs des persos (physique, social, technique, etc.)", tag: "key" },
      { t: "Mécanique de réputation : comment évolue le statut dans la rue ?", tag: "hot" },
      { t: "Mécanique de stress / santé mentale pour les excès des persos", tag: "hot" },
      { t: "Comment gérer les actions illégales : risque, exposition, conséquences", tag: "hot" },
      { t: "Système de compétences liées à la moto (tricks, mécanique, fuite)", tag: "key" },
      { t: "Comment les dettes / faveurs fonctionnent mécaniquement", tag: "key" },
      { t: "Est-ce que la mort des persos est possible ? À quelles conditions ?", tag: "opt" },
      { t: "Sessions longues ou courtes ? Format one-shot ou campagne ?", tag: "key" },
    ]
  },
  "L'asso DirtKrew": {
    icon: "ti-building",
    items: [
      { t: "Statut légal précis de l'asso (loi, type, depuis quand)", tag: "key" },
      { t: "Revenus légaux déclarés : événements, merch, partenariats", tag: "key" },
      { t: "Qui sait quoi sur les flux d'argent réels ?", tag: "hot" },
      { t: "Quelles personnes extérieures gravitent autour de l'asso (bénévoles, clients)", tag: "lore" },
      { t: "L'asso a-t-elle des réseaux sociaux actifs ? Qui les gère ?", tag: "opt" },
      { t: "Existe-t-il un local physique ou tout est nomade ?", tag: "lore" },
      { t: "Quels événements passés ont eu lieu ? Incidents mémorables ?", tag: "lore" },
      { t: "Les autres membres savent-ils pour le blanchiment de Tanjawi ?", tag: "hot" },
    ]
  },
  "PNJ essentiels": {
    icon: "ti-users",
    items: [
      { t: "Marcus Reeves (receleur / créancier de Nearyz) : motivations profondes", tag: "hot" },
      { t: "Kevin Strahl (comptable) : veut de l'argent ou autre chose ?", tag: "hot" },
      { t: "Dmitri Maslow (oncle de Yurisqua) : ressource ou menace ?", tag: "key" },
      { t: "Danny Crawford (frère de Thenec, en prison) : quand sort-il ? Quel rôle ?", tag: "hot" },
      { t: "Créer 1-2 PNJ féminins avec une vraie agentivité narrative", tag: "key" },
      { t: "Créer un représentant des forces de l'ordre (flic sympa ou corrompu ?)", tag: "key" },
      { t: "Créer un crew rival avec un nom, un territoire, une tension précise", tag: "lore" },
      { t: "Y a-t-il un boss criminel au-dessus des PNJ déjà définis ?", tag: "hot" },
      { t: "Familles des joueurs : présentes, absentes, impliquées ?", tag: "lore" },
    ]
  },
  "Arcs narratifs": {
    icon: "ti-flame",
    items: [
      { t: "Définir un arc court terme (session 1-3) et un arc long terme", tag: "key" },
      { t: "Quelle est la bombe à retardement centrale du lore ?", tag: "hot" },
      { t: "La vidéo de Thenec : qui veut la récupérer, qui veut la détruire", tag: "hot" },
      { t: "Comment les 4 arcs déclencheurs se croisent concrètement", tag: "hot" },
      { t: "Prévoir 2-3 moments de trahison possible entre les joueurs", tag: "key" },
      { t: "Qu'est-ce qui pourrait réunir le groupe contre un ennemi commun ?", tag: "lore" },
      { t: "Scénario d'escalade : le premier mort, la première arrestation", tag: "hot" },
      { t: "Quelle fin possible pour chaque personnage (rédemption, chute, fuite) ?", tag: "opt" },
    ]
  },
  "Bikelife & Motos": {
    icon: "ti-motorbike",
    items: [
      { t: "Définir les motos manquantes : pourquoi elles ont disparu (vol, saisie, dette)", tag: "key" },
      { t: "Comment le groupe compte récupérer des machines ?", tag: "key" },
      { t: "Grilles de compétences moto : qui sait faire quoi (tricks, mécanique, fuite)", tag: "lore" },
      { t: "Les spots de ride : légaux (terrains privés) vs illégaux (rue, autoroute)", tag: "lore" },
      { t: "Est-ce que la bikelife génère des revenus (vidéos, paris, paris illégaux) ?", tag: "opt" },
      { t: "Quels accidents passés ont marqué le groupe ? Trauma partagé ?", tag: "lore" },
      { t: "La moto comme symbole : qu'est-ce qu'en posséder une représente pour chaque perso ?", tag: "key" },
    ]
  },
  "Ambiance & Esthétique": {
    icon: "ti-palette",
    items: [
      { t: "Playlist de références musicales pour l'ambiance de jeu", tag: "opt" },
      { t: "Références visuelles : films, séries, photos pour aligner la vision du groupe", tag: "opt" },
      { t: "Vocabulaire commun : argot du groupe, expressions récurrentes", tag: "lore" },
      { t: "Comment les persos parlent différemment (registres, tics de langage)", tag: "lore" },
      { t: "Code vestimentaire lors des sessions importantes (rasso, deal, deal qui tourne mal)", tag: "opt" },
      { t: "La scène graffiti de Thenec : noms, spots, réputation dans la ville", tag: "lore" },
      { t: "Ambiance visuelle des différents lieux (garage sombre vs appartement hype vs entrepôt)", tag: "opt" },
    ]
  },
  "Méta & Logistique": {
    icon: "ti-settings",
    items: [
      { t: "Règles de table (lignes rouges, contenu sensible, safety tools)", tag: "hot" },
      { t: "Fréquence et durée des sessions", tag: "key" },
      { t: "Qui est MJ / comment la narration est distribuée", tag: "key" },
      { t: "Outils utilisés : dés physiques, appli, roll20, discord, etc.", tag: "key" },
      { t: "Comment gérer les absences de joueurs en cours de campagne", tag: "key" },
      { t: "Document partagé ou tout est en tête ? Besoin d'un wiki de campagne ?", tag: "opt" },
      { t: "Session zéro prévue pour aligner tout le monde sur le lore ?", tag: "hot" },
      { t: "Les joueurs peuvent-ils introduire des éléments de lore eux-mêmes ?", tag: "opt" },
    ]
  }
};

let checked = JSON.parse(localStorage.getItem('dk_checks') || '{}');
let currentCat = Object.keys(DATA)[0];

function save() {
  try { localStorage.setItem('dk_checks', JSON.stringify(checked)); } catch(e) {}
}

function totalStats() {
  let total = 0, done = 0;
  Object.keys(DATA).forEach(cat => {
    DATA[cat].items.forEach((item, i) => {
      total++;
      if (checked[cat + '_' + i]) done++;
    });
  });
  return { total, done };
}

function renderTabs() {
  const el = document.getElementById('cats');
  el.innerHTML = Object.keys(DATA).map(cat => 
    `<button class="ct ${cat===currentCat?'on':''}" onclick="switchCat('${cat}')">${cat}</button>`
  ).join('');
}

function renderProgress() {
  const { total, done } = totalStats();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-text').textContent = `${done} / ${total} éléments complétés`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderContent() {
  const cat = DATA[currentCat];
  const items = cat.items;
  const catDone = items.filter((_, i) => checked[currentCat+'_'+i]).length;

  let html = `<div class="section-block">
    <div class="sec-header">
      <i class="ti ${cat.icon} sec-icon" aria-hidden="true"></i>
      <span class="sec-title">${currentCat}</span>
      <span class="sec-count">${catDone}/${items.length}</span>
    </div>`;
  
  items.forEach((item, i) => {
    const key = currentCat + '_' + i;
    const done = !!checked[key];
    const tagMap = { hot: ['tag-hot','priorité'], key: ['tag-key','essentiel'], opt: ['tag-opt','optionnel'], lore: ['tag-lore','lore'] };
    const [tagCls, tagLbl] = tagMap[item.tag] || ['tag-opt',''];
    html += `<div class="item" onclick="toggle('${key}')">
      <div class="checkbox ${done?'checked':''}"><span class="check-mark">&#10003;</span></div>
      <span class="item-text ${done?'checked-text':''}">${item.t}</span>
      <span class="tag ${tagCls}">${tagLbl}</span>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function toggle(key) {
  checked[key] = !checked[key];
  save();
  renderContent();
  renderProgress();
}

function switchCat(cat) {
  currentCat = cat;
  renderTabs();
  renderContent();
}

function resetAll() {
  if (confirm('Réinitialiser toutes les cases ?')) {
    checked = {};
    save();
    renderContent();
    renderProgress();
  }
}

renderTabs();
renderContent();
renderProgress();
</script>
